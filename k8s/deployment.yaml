apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: ns-weatherapp
  name: weathervault-deployment
  labels:
    app: weathervault
    environment: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weathervault
  template:
    metadata:
      labels:
        app: weathervault
        environment: production
    spec:
      containers:
        - name: weathervault-container
          image: mokadir/weathervault:17
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          env:
            - name: APP_ENV
              value: "production"
          volumeMounts:
            - name: weathervault-config
              mountPath: /usr/share/nginx/html/config.json
              subPath: api-key
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: weathervault-config
          secret:
            secretName: weathervault-secrets
