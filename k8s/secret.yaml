apiVersion: v1
kind: Secret
metadata:
  namespace: ns-weatherapp
  name: weathervault-secrets
type: Opaque
stringData:
  # ⚠️ Replace with your actual OpenWeatherMap API key
  # For production, use kubectl create secret instead:
  #   kubectl create secret generic weathervault-secrets \
  #     --from-literal=api-key=YOUR_KEY \
  #     -n ns-weatherapp
  api-key: "REPLACE_WITH_YOUR_KEY"
